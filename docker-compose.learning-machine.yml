services:
  openclaw-gateway:
    networks:
      default:
      agno-network:
    environment:
      LEARNING_MACHINE_API_URL: "http://agno-api:8000"
    volumes:
      - ./skills/learning-machine:/app/skills/learning-machine:ro
      - ./extensions/learning-machine:/app/extensions/learning-machine:ro

  openclaw-cli:
    network_mode: "service:openclaw-gateway"
    environment:
      LEARNING_MACHINE_API_URL: "http://agno-api:8000"
    volumes:
      - ./skills/learning-machine:/app/skills/learning-machine:ro
      - ./extensions/learning-machine:/app/extensions/learning-machine:ro

networks:
  agno-network:
    external: true
    name: agno-api_agno-network
